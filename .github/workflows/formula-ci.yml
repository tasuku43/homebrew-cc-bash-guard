name: Formula CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  validate-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip until first formula lands
        if: ${{ hashFiles('Formula/cc-bash-proxy.rb') == '' }}
        run: echo "Formula/cc-bash-proxy.rb not present yet; skipping validation"

      - name: Validate Ruby syntax
        if: ${{ hashFiles('Formula/cc-bash-proxy.rb') != '' }}
        run: ruby -c Formula/cc-bash-proxy.rb

      - name: Check formula metadata
        if: ${{ hashFiles('Formula/cc-bash-proxy.rb') != '' }}
        run: |
          grep -q 'class CcBashProxy < Formula' Formula/cc-bash-proxy.rb
          grep -q 'https://github.com/tasuku43/cc-bash-proxy/releases/download/' Formula/cc-bash-proxy.rb
          grep -q 'bin.install "cc-bash-proxy"' Formula/cc-bash-proxy.rb
