name: Formula CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  validate-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip until first formula lands
        if: ${{ hashFiles('Formula/cc-bash-guard.rb') == '' }}
        run: echo "Formula/cc-bash-guard.rb not present yet; skipping validation"

      - name: Validate Ruby syntax
        if: ${{ hashFiles('Formula/cc-bash-guard.rb') != '' }}
        run: ruby -c Formula/cc-bash-guard.rb

      - name: Check formula metadata
        if: ${{ hashFiles('Formula/cc-bash-guard.rb') != '' }}
        run: |
          grep -q 'class CcBashGuard < Formula' Formula/cc-bash-guard.rb
          grep -q 'https://github.com/tasuku43/cc-bash-guard/releases/download/' Formula/cc-bash-guard.rb
          grep -q 'bin.install "cc-bash-guard"' Formula/cc-bash-guard.rb
